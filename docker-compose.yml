services:
  postgres:
    image: postgres:16-alpine
    container_name: ims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
      POSTGRES_DB: ims
    ports:
      - "5432:5432"
    volumes:
      - ims-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d ims"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ims-pgdata: